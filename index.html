<script>
    document.getElementById("content").innerHTML = "✅ JavaScript is running";

    FSM.onReady(function () {

        console.log("FSM Loaded");

        FSM.getContext().then(function (context) {

            console.log("Context:", context);

            const equipment = context.object || {};
            const udf = equipment.udf || {};

            const spcStatus = udf.SPC_STATUS;
            const equipmentCode = equipment.code;

            const container = document.getElementById("content");

            console.log("SPC Status:", spcStatus);
            console.log("Equipment Code:", equipmentCode);

            if (!spcStatus) {
                container.innerHTML = "<p style='color:orange;'>⚠️ Equipment not available</p>";
                return;
            }

            if (spcStatus == 6 || spcStatus == 7) {
                const url = "https://spc.company.com/equipment?eq=" + equipmentCode;

                container.innerHTML = "<a href='" + url + "' target='_blank'>🔗 Open SPC</a>";
                return;
            }

            container.innerHTML = "<p style='color:red;'>❌ Access not allowed</p>";

        }).catch(function (err) {
            console.error("Context Error:", err);
        });

    });
</script>
