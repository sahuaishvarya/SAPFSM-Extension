<script>
    const container = document.getElementById("content");

    container.innerHTML = "✅ JavaScript running<br>";

    // FSM sends data via postMessage
    window.addEventListener("message", function (event) {

        container.innerHTML += "✅ Message received from FSM<br>";

        const data = event.data;

        console.log("FSM Data:", data);

        if (!data || !data.object) {
            container.innerHTML += "❌ No object data received<br>";
            return;
        }

        const equipment = data.object;
        const udf = equipment.udf || {};

        const spcStatus = udf.SPC_STATUS; // adjust if needed
        const equipmentCode = equipment.code;

        container.innerHTML += "📌 SPC Status: " + spcStatus + "<br>";
        container.innerHTML += "📌 Equipment Code: " + equipmentCode + "<br>";

        // ⚠️ EMPTY
        if (!spcStatus) {
            container.innerHTML += "<br>⚠️ Equipment not available";
            return;
        }

        // ✅ ALLOWED
        if (spcStatus == 6 || spcStatus == 7 || spcStatus == "6" || spcStatus == "7") {

            const url = "https://spc.company.com/equipment?eq=" + equipmentCode;

            container.innerHTML += "<br>✅ SPC Access Allowed<br>";
            container.innerHTML += "<a href='" + url + "' target='_blank'>🔗 Open SPC</a>";
            return;
        }

        // ❌ NOT ALLOWED
        container.innerHTML += "<br>❌ SPC access not allowed";

    });
</script>
